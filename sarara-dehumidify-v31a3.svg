<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<rect width="1200" height="900" fill="#f6fbff"/>
<rect x="30" y="30" width="1140" height="840" rx="30" fill="#fff" stroke="#b9d9ec" stroke-width="4"/>
<text x="600" y="95" text-anchor="middle" font-size="45" font-family="sans-serif" font-weight="700" fill="#0b315f">さらら除湿</text>
<text x="600" y="140" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#536d81">季節や室温・湿度に合わせて、除湿量を細かく調整</text>

<rect x="90" y="185" width="1020" height="160" rx="24" fill="#eef7ff" stroke="#58a5db" stroke-width="3"/>
<text x="600" y="230" text-anchor="middle" font-size="28" font-family="sans-serif" font-weight="700" fill="#1267a9">一言でいうと</text>
<text x="600" y="278" text-anchor="middle" font-size="27" font-family="sans-serif" fill="#223">湿気を取りながら、肌寒さを抑えて使いやすくする除湿</text>
<text x="600" y="318" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#536d81">使用環境により吹き出し温度が下がる場合があります</text>

<rect x="80" y="395" width="500" height="305" rx="28" fill="#edf7ff" stroke="#58a5db" stroke-width="4"/>
<text x="330" y="455" text-anchor="middle" font-size="35" font-family="sans-serif" font-weight="700" fill="#1267a9">R・Aシリーズ</text>
<text x="330" y="505" text-anchor="middle" font-size="29" font-family="sans-serif" font-weight="700" fill="#0b315f">リニアハイブリッド方式</text>
<text x="125" y="560" font-size="23" font-family="sans-serif" fill="#223">・複数の除湿方式を切り替える</text>
<text x="125" y="607" font-size="23" font-family="sans-serif" fill="#223">・熱交換器をリニアに制御</text>
<text x="125" y="654" font-size="23" font-family="sans-serif" fill="#223">・必要な除湿量へ細かく合わせる</text>

<rect x="620" y="395" width="500" height="305" rx="28" fill="#eef9f2" stroke="#65ad7d" stroke-width="4"/>
<text x="870" y="455" text-anchor="middle" font-size="35" font-family="sans-serif" font-weight="700" fill="#2f8a55">Fシリーズ</text>
<text x="870" y="505" text-anchor="middle" font-size="29" font-family="sans-serif" font-weight="700" fill="#0b315f">ハイブリッド方式</text>
<text x="665" y="560" font-size="23" font-family="sans-serif" fill="#223">・季節やシーンに合わせて制御</text>
<text x="665" y="607" font-size="23" font-family="sans-serif" fill="#223">・除湿能力を細かく調整</text>
<text x="665" y="654" font-size="23" font-family="sans-serif" fill="#223">・肌寒さを抑えて除湿</text>

<rect x="105" y="745" width="990" height="80" rx="20" fill="#fff4d9" stroke="#dfbd5b" stroke-width="3"/>
<text x="600" y="778" text-anchor="middle" font-size="21" font-family="sans-serif" fill="#684f00">リニアハイブリッド方式は、一般社団法人 日本冷凍空調工業会による</text>
<text x="600" y="808" text-anchor="middle" font-size="21" font-family="sans-serif" fill="#684f00">「再熱除湿方式」には該当しません。搭載内容は型番で確認してください。</text>
</svg>